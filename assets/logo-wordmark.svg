<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-label="Veltra">
  <title>Veltra</title>
  <defs>
    <linearGradient id="wL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#3B1A78"/><stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="wR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#7C3AED"/><stop offset="100%" stop-color="#C026D3"/>
    </linearGradient>
    <linearGradient id="wD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#C026D3"/><stop offset="100%" stop-color="#F0ABFC"/>
    </linearGradient>
    <linearGradient id="wJ" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#D946EF"/><stop offset="100%" stop-color="#A21CAF"/>
    </linearGradient>
  </defs>

  <!-- Mark, scaled to ~440 px tall, centered -->
  <g transform="translate(420 30) scale(.72)">
    <path d="M256 28 L286 60 L256 92 L226 60 Z" fill="url(#wJ)"/>
    <path d="M60 110 L180 110 L264 460 L144 460 Z" fill="url(#wL)"/>
    <path d="M332 110 L452 110 L368 460 L248 460 Z" fill="url(#wR)"/>
    <path d="M256 410 L296 460 L256 510 L216 460 Z" fill="url(#wD)"/>
  </g>

  <!-- Wordmark -->
  <text x="600" y="660" text-anchor="middle"
        fill="#15101F"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="700"
        font-size="120"
        letter-spacing="14">VELTRA</text>

  <!-- Slogan -->
  <text x="600" y="720" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-size="22" letter-spacing="6"
        fill="#6B6478">BUILT FASTER. BUILT TO LAST.</text>
</svg>
