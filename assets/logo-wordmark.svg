<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="Veltra">
  <title>Veltra</title>
  <defs>
    <linearGradient id="wL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#3B1A78"/><stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="wR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#7C3AED"/><stop offset="100%" stop-color="#C026D3"/>
    </linearGradient>
  </defs>

  <!-- Mark -->
  <g transform="translate(420 60) scale(.78)">
    <path d="M40 30 L180 30 L262 450 L122 450 Z" fill="url(#wL)"/>
    <path d="M332 30 L472 30 L390 450 L250 450 Z" fill="url(#wR)"/>
  </g>

  <!-- Wordmark -->
  <text x="600" y="600" text-anchor="middle"
        fill="#15101F"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="700"
        font-size="120"
        letter-spacing="14">VELTRA</text>

  <!-- Slogan -->
  <text x="600" y="660" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-size="22" letter-spacing="6"
        fill="#6B6478">BUILT FASTER. BUILT TO LAST.</text>
</svg>
